        <h1 class="text-5xl font-extrabold text-center mt-12 text-rose-950">Certificates</h1>

        <section class="flex justify-center mt-10 mb-12 px-6">

        <div class="flex flex-wrap justify-center gap-6">

            <div class="bg-rose-300 w-80 p-6 rounded-2xl shadow-md flex flex-col items-center text-center hover:-translate-y-1 hover:shadow-rose-950 hover:shadow-xl transition duration-300">
                <img src="images/certifications/ms-word-associate.jpg" 
                class="w-70 h-50 object-cover rounded-xl mb-4"
                onclick="openModal(this.src)">

                <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                target="_blank"
                class="text-rose-950 text-lg font-extrabold hover:underline">
                Microsoft Word Certificate</a>
            </div>

            <div class="bg-rose-300 w-80 p-6 rounded-2xl shadow-md flex flex-col items-center text-center hover:-translate-y-1 hover:shadow-rose-950 hover:shadow-xl transition duration-300">

                class="w-70 h-50 object-cover rounded-xl mb-4"

                Microsoft PowerPoint Certificate</a>

        </div>

    <div id="imageModal" class="fixed inset-0 hidden bg-black/80 flex items-center justify-center z-50">
            <img id="modalImg" class="max-w-[90%] max-h-[90%] rounded shadow-lg">
    </div>
    
     <script src="script.js"></script>
         <!--ANIME.JS TEXT ANIMATION-->
    <script type="module">
        import { animate, stagger, splitText } from 'https://esm.sh/animejs';
    
        const { chars } = splitText('h1', { words: false, chars: true });
        
        animate(chars, {
          // Property keyframes
          y: [
            { to: '-2.75rem', ease: 'outExpo', duration: 600 },
            { to: 0, ease: 'outBounce', duration: 800, delay: 100 }
          ],
          // Property specific parameters
          rotate: {
            from: '-1turn',
            delay: 0
          },
          delay: stagger(50),
          ease: 'inOutCirc',
          loopDelay: 1000,
          loop: true
        });
        </script>
